kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 30700 # PostgreSQL
    hostPort: 5432
    protocol: TCP
  - containerPort: 30800 # OpenSearch
    hostPort: 9200
    protocol: TCP
  - containerPort: 30900 # OpenSearch Dashboard
    hostPort: 5601
    protocol: TCP
  - containerPort: 31000 # PGSync API
    hostPort: 8080
    protocol: TCP
