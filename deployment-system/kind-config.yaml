kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 30300 # Prometheus
    hostPort: 30300
    protocol: TCP
  - containerPort: 30400 # Grafana
    hostPort: 30400
    protocol: TCP
  - containerPort: 30500 # Docker Registry
    hostPort: 30500
    protocol: TCP
  - containerPort: 30600 # Jenkins
    hostPort: 30600
    protocol: TCP
