controller:
  serviceType: NodePort
  servicePort: 8080
  nodePort: 30600
  installPlugins:
    - kubernetes:3961.v76b_969db_e4a_b_5
    - workflow-aggregator:596.v8c21c963d92d
    - git:5.2.0
    - docker-workflow:563.vd5d2e5c4007f
    - docker-plugin:1.5
    - configuration-as-code:1647.ve39ca_b_829b_42
    - job-dsl:1.84
  JCasC:
    securityRealm: |-
      local:
        allowsSignup: false
        enableCaptcha: false
        users:
        - id: admin
          name: Admin
          password: admin
    authorizationStrategy: |-
      loggedInUsersCanDoAnything:
        allowAnonymousRead: false
    jobs:
      - script: >
          folder('deployment-system') {
            displayName('Deployment System')
            description('Jobs for Deployment System projects')
          }
          pipelineJob('deployment-system/hello-buddy') {
            definition {
              cpsScm {
                scm {
                  git {
                    remote {
                      url('https://github.com/codegik/devops.git')
                      credentials('github-credentials')
                    }
                    branch('*/master')
                  }
                }
                scriptPath('app/hello-buddy/Jenkinsfile')
                lightweight(true)
              }
            }
          }
  serviceAccount:
    create: true
    name: jenkins
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1500m"
      memory: "3Gi"
  javaOpts: "-Xmx2g -Xms1g"